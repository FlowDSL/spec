# FlowDSL + redelay / AsyncAPI integration example
#
# Shows how FlowDSL events can reference payload schemas owned by an AsyncAPI
# document generated by redelay. This keeps the payload schema as a single
# source of truth in the Python redelay EventDefinition classes while letting
# FlowDSL add entityType, action, version, and tags metadata.
#
# Pattern — use components.events (not bare asyncapi#/ refs on node ports):
#
#   components:
#     events:
#       DomainExpired:
#         entityType: domain
#         action: expired
#         payload:
#           $ref: "asyncapi#/components/messages/DomainExpiredPayload"
#
# Then reference the FlowDSL event on node ports:
#   message:
#     $ref: "#/components/events/DomainExpired"
#
# This keeps FlowDSL self-contained (all node ports use local #/ refs) while
# delegating payload schema ownership to redelay/AsyncAPI at the components level.
#
# redelay generates AsyncAPI automatically from Python EventDefinition classes.
# Run the service and point externalDocs.asyncapi at the live endpoint.
#
# See docs/integrations/asyncapi.md for full details.

flowdsl: "1.0.0"

info:
  title: Domain Drop Catch Flows (redelay / AsyncAPI integration)
  version: "1.0.0"
  description: >
    Same domain pipeline as the main example, but boundary events (entrypoints
    and external-facing node ports) reference payload schemas from a redelay-
    generated AsyncAPI document. Internal packet schemas remain local.
    All node ports reference #/components/events/... — the asyncapi#/ ref lives
    inside the event definition's payload.$ref, keeping node contracts stable
    even if the external spec URL changes.

servers:
  default:
    url: flow-runtime.internal
    protocol: hybrid
    description: Default hybrid runtime

# externalDocs declares where the AsyncAPI document lives.
# The runtime resolves asyncapi#/... $refs using this URL at startup.
externalDocs:
  asyncapi: /asyncapi.json
  description: >
    AsyncAPI document that owns the external event message contracts.
    FlowDSL references these schemas — it does not duplicate them.

flows:

  domain_drop_pipeline:
    summary: Domain drop catch pipeline
    description: >
      Filters, enriches, scores, and LLM-analyzes expiring domains.
      Entrypoint references the AsyncAPI DomainExpiredPayload message.
      Internal packets are still defined locally.
    tags: [domain, high-throughput, llm, asyncapi]

    entrypoints:
      - message:
          # Reference the FlowDSL event — its payload.$ref points to AsyncAPI
          $ref: "#/components/events/DomainExpired"
        description: Triggered when a DomainExpiredPayload event arrives (via redelay Kafka)

    nodes:
      rule_filter:
        $ref: "#/components/nodes/RuleFilterNode"
      dns_check:
        $ref: "#/components/nodes/DnsCheckNode"
      score_preselect:
        $ref: "#/components/nodes/ScorePreselectNode"
      llm_analysis:
        $ref: "#/components/nodes/LlmAnalysisNode"
      publish_results:
        $ref: "#/components/nodes/PublishResultsNode"

    edges:

      - from: rule_filter
        to: dns_check
        when: "output.name == 'RulePassedDomain'"
        protocol: proc
        delivery:
          mode: direct
          batching:
            enabled: true
            batchSize: 1000
            maxWaitMs: 50
          maxInFlight: 10000

      - from: dns_check
        to: score_preselect
        protocol: grpc
        delivery:
          mode: ephemeral
          backend: redis
          batching:
            enabled: true
            batchSize: 500
          recovery:
            replayFrom: "checkpoint:domain_ingest"
            strategy: replayFromCheckpoint

      - from: score_preselect
        to: llm_analysis
        when: "output.name == 'DomainShortlisted'"
        protocol: http
        delivery:
          mode: durable
          store: mongo
          retryPolicy:
            $ref: "#/components/policies/llmExpensiveRetry"

      - from: llm_analysis
        to: publish_results
        protocol: kafka
        delivery:
          mode: stream
          stream:
            bus: kafka
            topic: domains.analyzed
            partitionKey: payload.domain

    defaults:
      execution:
        timeoutMs: 30000
        maxRetries: 3


  work_email_handler:
    summary: Work email processing workflow
    tags: [email, asyncapi]

    entrypoints:
      - message:
          $ref: "#/components/events/NewEmailReceived"
        description: Triggered when a NewEmailReceived event arrives (via redelay Kafka)

    nodes:
      priority_router:
        $ref: "#/components/nodes/PriorityRouterNode"
      urgent_sms_alert:
        $ref: "#/components/nodes/UrgentSmsAlertNode"
      llm_summary:
        $ref: "#/components/nodes/LlmSummaryNode"
      ticket_creator:
        $ref: "#/components/nodes/TicketCreatorNode"

    edges:

      - from: priority_router
        to: urgent_sms_alert
        when: "output.name == 'UrgentEmailDetected'"
        protocol: http
        delivery:
          mode: durable
          store: mongo
          retryPolicy:
            $ref: "#/components/policies/urgentAlertRetry"

      - from: priority_router
        to: llm_summary
        when: "output.name == 'EmailForSummarization'"
        protocol: http
        delivery:
          mode: durable
          store: mongo
          retryPolicy:
            $ref: "#/components/policies/llmExpensiveRetry"

      - from: llm_summary
        to: ticket_creator
        protocol: http
        delivery:
          mode: durable
          store: mongo
          retryPolicy:
            $ref: "#/components/policies/urgentAlertRetry"


components:

  nodes:

    RuleFilterNode:
      operationId: run_domain_rule_filter
      title: Rule Filter
      kind: router
      runtime:
        language: go
        handler: app.nodes.domain.RuleFilterNode
        supports:
          - proc
          - grpc
          - http
      inputs:
        - name: DomainExpired
          # Reference the FlowDSL event — its payload.$ref delegates to AsyncAPI
          message:
            $ref: "#/components/events/DomainExpired"
      outputs:
        - name: RulePassedDomain
          # Internal output: schema defined locally as a packet
          message:
            $ref: "#/components/packets/RulePassedDomainPacket"
        - name: RuleRejectedDomain
          message:
            $ref: "#/components/packets/RuleRejectedDomainPacket"
      execution:
        timeoutMs: 5000
        concurrency: 500

    DnsCheckNode:
      operationId: run_dns_check
      title: DNS Check
      kind: transform
      runtime:
        language: go
        handler: app.nodes.domain.DnsCheckNode
        supports:
          - proc
          - grpc
          - http
      inputs:
        - name: RulePassedDomain
          message:
            $ref: "#/components/packets/RulePassedDomainPacket"
      outputs:
        - name: DomainEnriched
          message:
            $ref: "#/components/packets/DomainEnrichedPacket"
      execution:
        timeoutMs: 10000
        concurrency: 200

    ScorePreselectNode:
      operationId: run_score_preselect
      title: Score & Preselect
      kind: router
      runtime:
        language: python
        handler: app.nodes.domain.ScorePreselectNode
        supports:
          - http
          - grpc
          - proc
      inputs:
        - name: DomainEnriched
          message:
            $ref: "#/components/packets/DomainEnrichedPacket"
      outputs:
        - name: DomainShortlisted
          message:
            $ref: "#/components/packets/DomainShortlistedPacket"
        - name: DomainRejected
          message:
            $ref: "#/components/packets/DomainRejectedPacket"
      execution:
        timeoutMs: 3000
        concurrency: 100

    LlmAnalysisNode:
      operationId: run_llm_analysis
      title: LLM Analysis
      kind: llm
      runtime:
        language: python
        handler: app.nodes.domain.LlmAnalysisNode
        supports:
          - http
          - grpc
          - proc
      inputs:
        - name: DomainShortlisted
          message:
            $ref: "#/components/packets/DomainShortlistedPacket"
      outputs:
        - name: DomainAnalyzed
          message:
            $ref: "#/components/packets/DomainAnalyzedPacket"
      execution:
        timeoutMs: 120000
        concurrency: 10
      idempotency:
        enabled: true
        keyExpression: "input.payload.domain + ':' + input.payload.dropDate"
        ttlSeconds: 86400
        store: mongo

    PublishResultsNode:
      operationId: run_publish_results
      title: Publish Results
      kind: publish
      runtime:
        language: go
        handler: app.nodes.domain.PublishResultsNode
        supports:
          - proc
          - kafka
          - grpc
      inputs:
        - name: DomainAnalyzed
          message:
            $ref: "#/components/packets/DomainAnalyzedPacket"
      outputs: []
      execution:
        timeoutMs: 5000
        concurrency: 50

    PriorityRouterNode:
      operationId: run_priority_router
      title: Priority Router
      kind: router
      runtime:
        language: python
        handler: app.nodes.email.PriorityRouterNode
        supports:
          - http
          - grpc
          - proc
      inputs:
        - name: NewEmailReceived
          # Reference the FlowDSL event — its payload.$ref delegates to AsyncAPI
          message:
            $ref: "#/components/events/NewEmailReceived"
      outputs:
        - name: UrgentEmailDetected
          message:
            $ref: "#/components/packets/UrgentEmailPacket"
        - name: EmailForSummarization
          message:
            $ref: "#/components/packets/EmailSummarizationPacket"
      execution:
        timeoutMs: 5000
        concurrency: 50

    UrgentSmsAlertNode:
      operationId: run_urgent_sms_alert
      title: Urgent SMS Alert
      kind: action
      runtime:
        language: python
        handler: app.nodes.email.UrgentSmsAlertNode
        supports:
          - http
          - grpc
          - proc
      inputs:
        - name: UrgentEmailDetected
          message:
            $ref: "#/components/packets/UrgentEmailPacket"
      outputs: []
      idempotency:
        enabled: true
        keyExpression: "input.payload.emailId + ':sms'"
        ttlSeconds: 3600
        store: redis
      execution:
        timeoutMs: 10000
        concurrency: 20

    LlmSummaryNode:
      operationId: run_llm_summary
      title: LLM Summary
      kind: llm
      runtime:
        language: python
        handler: app.nodes.email.LlmSummaryNode
        supports:
          - http
          - grpc
          - proc
      inputs:
        - name: EmailForSummarization
          message:
            $ref: "#/components/packets/EmailSummarizationPacket"
      outputs:
        - name: EmailSummarized
          message:
            $ref: "#/components/packets/EmailSummarizedPacket"
      idempotency:
        enabled: true
        keyExpression: "input.payload.emailId + ':summary'"
        ttlSeconds: 86400
        store: mongo
      execution:
        timeoutMs: 60000
        concurrency: 5

    TicketCreatorNode:
      operationId: run_ticket_creator
      title: Ticket Creator
      kind: action
      runtime:
        language: python
        handler: app.nodes.email.TicketCreatorNode
        supports:
          - http
          - grpc
          - proc
      inputs:
        - name: EmailSummarized
          message:
            $ref: "#/components/packets/EmailSummarizedPacket"
      outputs: []
      idempotency:
        enabled: true
        keyExpression: "input.payload.emailId + ':ticket'"
        ttlSeconds: 86400
        store: mongo
      execution:
        timeoutMs: 15000
        concurrency: 20

  policies:

    llmExpensiveRetry:
      maxAttempts: 5
      initialDelayMs: 2000
      backoff: exponential
      maxDelayMs: 120000
      deadLetterQueue: true

    urgentAlertRetry:
      maxAttempts: 10
      initialDelayMs: 500
      backoff: exponential
      maxDelayMs: 30000
      deadLetterQueue: true

  # Boundary events: FlowDSL event definitions whose payload schemas are
  # delegated to the redelay-generated AsyncAPI document via asyncapi#/ refs.
  # Node ports reference these events using local #/ refs — stable across
  # service URL changes.
  events:

    DomainExpired:
      entityType: domain
      action: expired
      version: "1.0.0"
      summary: Fired when a domain expires and becomes available. Owned by redelay.
      tags: [domain, expired]
      payload:
        # Payload schema owned by the Python redelay system.
        # The runtime resolves this ref using externalDocs.asyncapi at startup.
        $ref: "asyncapi#/components/messages/DomainExpiredPayload"

    NewEmailReceived:
      entityType: email
      action: received
      version: "1.0.0"
      summary: Fired when a new email arrives. Owned by redelay.
      tags: [email]
      payload:
        $ref: "asyncapi#/components/messages/NewEmailReceived"

  packets:

    RulePassedDomainPacket:
      type: object
      required: [domain, dropDate]
      properties:
        domain: { type: string }
        dropDate: { type: string, format: date }
        tld: { type: string }
        registrar: { type: string }

    RuleRejectedDomainPacket:
      type: object
      required: [domain, reason]
      properties:
        domain: { type: string }
        reason: { type: string }

    DomainEnrichedPacket:
      type: object
      required: [domain, dns]
      properties:
        domain: { type: string }
        dropDate: { type: string, format: date }
        dns:
          type: object
          properties:
            aRecords: { type: array, items: { type: string } }
            nsRecords: { type: array, items: { type: string } }
            mxRecords: { type: array, items: { type: string } }

    DomainShortlistedPacket:
      type: object
      required: [domain, score]
      properties:
        domain: { type: string }
        score: { type: number, minimum: 0, maximum: 1 }
        dropDate: { type: string, format: date }
        signals: { type: object }

    DomainRejectedPacket:
      type: object
      required: [domain, score, reason]
      properties:
        domain: { type: string }
        score: { type: number }
        reason: { type: string }

    DomainAnalyzedPacket:
      type: object
      required: [domain, finalScore, analysis]
      properties:
        domain: { type: string }
        finalScore: { type: number, minimum: 0, maximum: 1 }
        analysis:
          type: object
          properties:
            summary: { type: string }
            useCases: { type: array, items: { type: string } }
            brandability: { type: number }
            memorability: { type: number }

    UrgentEmailPacket:
      type: object
      required: [emailId, subject, from, urgencyReason]
      properties:
        emailId: { type: string }
        subject: { type: string }
        from: { type: string }
        urgencyReason: { type: string }
        receivedAt: { type: string, format: date-time }

    EmailSummarizationPacket:
      type: object
      required: [emailId, subject, body]
      properties:
        emailId: { type: string }
        subject: { type: string }
        body: { type: string }
        from: { type: string }
        receivedAt: { type: string, format: date-time }

    EmailSummarizedPacket:
      type: object
      required: [emailId, summary]
      properties:
        emailId: { type: string }
        summary: { type: string }
        keyPoints: { type: array, items: { type: string } }
        suggestedAction: { type: string }
        priority:
          type: string
          enum: [low, medium, high, critical]
